<html>

<head>
	<title>{{ title }}</title>
    <meta charset="utf-8">
    <style type="text/css">
		body {
            font-family: "Helvetica Neue", Helvetica, Arial, Verdana, "Trebuchet MS";
            font-size: normal;
        }

        tfoot, thead {
            font-size: small;
        }

        .tg {
            border-collapse: collapse;
            border-spacing: 0;
        }

        .tg td {
            border-color: black;
            border-style: solid;
            border-width: 1px;
            overflow: hidden;
            padding: 5px 5px;
            word-break: normal;
        }

        .tg th {
            border-color: black;
            border-style: solid;
            border-width: 1px;
            overflow: hidden;
            padding: 5px 5px;
            word-break: normal;
            text-align: left;
        }

        .tg .tg-0pky {
            border-color: inherit;
            vertical-align: middle
        }

        ul {
            margin: 0;
            padding: 0;
        }

        li {
            margin: 4px 0px
        }
    </style>
</head>

<body>
    <table style="width: 100%;">
        <thead>
            <tr>
                <th style="background-color: lightblue; padding: 15px;text-align: left;">
                    <h2 style="margin: 0">{{ title }}</h2>
                </th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td style="padding: 15px;">
                    <p>Bonjour,</p>
                    {% block content %}{% endblock %}
					<p>
                        Meilleures salutations,<br>
                        Infolica
                    </p>
                </td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <td style="background-color: lightblue; padding: 15px;text-align: left;">
                    <p><em>Cet e-mail est généré automatiquement. Merci de ne pas y répondre. Pour toute question ou remarque: <a href="mailto:{{ admin_mail }}">{{ admin_mail }}</a></em></p>
                </td>
            </tr>

        </tfoot>
    </table>

</body>

</html>
